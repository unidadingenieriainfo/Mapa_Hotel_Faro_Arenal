<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Hotel Faro Arenal</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #00a8cc 0%, #0891b2 50%, #0e7490 100%);
  min-height: 100vh;
  padding: 25px;
}

.container {
  max-width: 1600px;
  margin: 0 auto;
}

.header {
  text-align: center;
  background: rgba(255,255,255,0.98);
  border-radius: 20px;
  padding: 35px 25px;
  margin-bottom: 25px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

.logo {
  color: #00a8cc;
  font-size: 2.5em;
  font-weight: bold;
  margin-bottom: 10px;
}

.header h1 {
  color: #0e7490;
  font-size: 2em;
  margin-bottom: 8px;
}

.header h2 {
  color: #0891b2;
  font-size: 1.1em;
  font-weight: normal;
}

.badge {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  padding: 7px 18px;
  border-radius: 20px;
  font-size: 0.9em;
  font-weight: bold;
  display: inline-block;
  margin-top: 14px;
}

.map-card {
  background: rgba(255,255,255,0.98);
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.18);
  overflow: hidden;
}

.map-title {
  color: #0e7490;
  font-size: 1.3em;
  font-weight: bold;
  margin-bottom: 15px;
  text-align: center;
}

.map-wrapper {
  width: 100%;
  overflow-x: auto;
  border-radius: 14px;
  border: 3px solid #e0f2fe;
  background: #f8fafc;
}

.map-wrapper img {
  width: 100%;
  min-width: 1200px;
  height: auto;
  display: block;
}

.footer {
  text-align: center;
  color: rgba(255,255,255,0.9);
  margin-top: 35px;
  padding: 20px;
  font-size: 0.9em;
  line-height: 1.7;
}

@media (max-width: 768px) {
  body {
    padding: 15px;
  }

  .logo {
    font-size: 1.8em;
  }

  .header h1 {
    font-size: 1.5em;
  }

  .map-wrapper img {
    min-width: 900px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">🌐 COOPELESCA R.L.</div>
    <h1>Mapa Hotel Faro Arenal</h1>
    <h2>Vista general del sitio para Proyecto WiFi Empresarial</h2>
    <span class="badge">F-ARNL · 2026</span>
  </div>

  <div class="map-card">
    <div class="map-title">Mapa General del Hotel Faro Arenal</div>

    <div class="map-wrapper">
      <img src="habitaciones_003.jpg" alt="Mapa Hotel Faro Arenal">
    </div>
  </div>

  <div class="footer">
    <strong>Coopelesca R.L. – Departamento de Infocomunicaciones</strong><br>
    Proyecto WiFi Empresarial Hotel Faro Arenal · 2026
  </div>

</div>

</body>
</html>
